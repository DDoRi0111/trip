                name: "메가 돈키호테 키쿠요점",
                category: "종합 잡화",
                desc: "구마모토 공항 인근, 넓고 쾌적한 쇼핑 환경",
                mustBuy: ["휴족시간", "과자", "의약품"],
                icon: <ShoppingBag className="w-6 h-6 text-pink-500" />
              },
              {
                name: "이온몰 구마모토",
                category: "대형 마트",
                desc: "무료 주차 가능, 토이저러스와 유니클로 입점",
                mustBuy: ["장난감", "유니클로", "마트 장보기"],
                icon: <ShoppingBag className="w-6 h-6 text-blue-500" />
              }
            ]
          };

          return (
            <div className="bg-white min-h-screen font-sans text-gray-800 pb-12 max-w-3xl mx-auto shadow-2xl relative">
              {/* Header Image Area */}
              <div className="relative h-56 bg-slate-800">
                <img 
                  src="https://img.modetour.com/eagle/photoimg/85344/bfile/638912949444539345.png" 
                  alt="Header" 
                  className="w-full h-full object-cover opacity-80"
                />
                <div className="absolute bottom-0 left-0 p-6 text-white w-full bg-gradient-to-t from-black/80 to-transparent">
                  <div className="inline-block px-3 py-1 bg-pink-500 text-xs font-bold rounded-full mb-2 shadow-md">FAMILY TRIP</div>
                  <h1 className="text-2xl font-bold leading-tight">{travelData.title}</h1>
                  <p className="text-sm opacity-90 mt-1">{travelData.subtitle}</p>
                </div>
              </div>

              {/* Main Tabs */}
              <div className="flex border-b border-gray-200">
                <button 
                  onClick={() => setActiveTab('itinerary')}
                  className={`flex-1 py-4 text-center font-bold text-sm ${activeTab === 'itinerary' ? 'text-pink-600 border-b-2 border-pink-600' : 'text-gray-400'}`}
                >
                  통합 일정표
                </button>
                <button 
                  onClick={() => setActiveTab('shopping')}
                  className={`flex-1 py-4 text-center font-bold text-sm ${activeTab === 'shopping' ? 'text-pink-600 border-b-2 border-pink-600' : 'text-gray-400'}`}
                >
                  쇼핑 & 비용
                </button>
              </div>

              {activeTab === 'itinerary' && (
                <>
                  {/* Quick Day Navigation (Sticky) */}
                  <div className="sticky top-0 z-40 bg-white/95 backdrop-blur-sm shadow-sm border-b border-gray-100 flex overflow-x-auto hide-scrollbar px-2 py-2 gap-2">
                    {travelData.itinerary.map((day, idx) => (
                      <button 
                        key={idx}
                        onClick={() => scrollToDay(idx)}
                        className="flex-shrink-0 px-4 py-2 rounded-full bg-gray-50 border border-gray-200 text-xs font-bold text-gray-600 hover:bg-pink-50 hover:text-pink-600 hover:border-pink-200 transition-all whitespace-nowrap"
                      >
                        {day.day}일차
                      </button>
                    ))}
                  </div>

                  <div className="p-5 space-y-8">
                    {/* 1. TOP FLIGHT SECTION (UPDATED DESIGN) */}
                    <section>
                      <h2 className="text-lg font-bold mb-4 text-gray-800 flex items-center">
                        <Plane className="w-5 h-5 mr-2 text-pink-600" /> 항공 일정 (요약)
                      </h2>
                      <FlightTimelineCard flightInfo={travelData.flights.departure} type="departure" />
                      <FlightTimelineCard flightInfo={travelData.flights.return} type="arrival" />
                    </section>

                    <hr className="border-gray-100" />

                    {/* 2. SUMMARY SECTION */}
                    <section className="bg-white p-2">
                      <h2 className="text-lg font-bold mb-6 text-gray-800">여행 요약</h2>
                      
                      <div className="space-y-6">
                        {/* Meal */}
                        <div className="flex gap-4">
                           <div className="flex flex-col items-center w-6">
                              <Utensils className="w-5 h-5 text-gray-400" />
                              <div className="w-[2px] h-full bg-gray-200 mt-2"></div>
                           </div>
                           <div className="flex-1 pb-4">
                              <h3 className="text-base font-bold text-gray-800 mb-1">식사</h3>
                              <p className="text-sm text-gray-600 leading-relaxed">{travelData.summary.meal}</p>
                           </div>
                        </div>

                        {/* Tour */}
                        <div className="flex gap-4">
                           <div className="flex flex-col items-center w-6">
                              <Camera className="w-5 h-5 text-gray-400" />
                              <div className="w-[2px] h-full bg-gray-200 mt-2"></div>
                           </div>
                           <div className="flex-1 pb-4">
                              <h3 className="text-base font-bold text-gray-800 mb-1">관광</h3>
                              <ul className="text-sm text-gray-600 leading-relaxed list-disc list-inside space-y-1">
                                {travelData.summary.tour.map((spot, idx) => (
                                  <li key={idx}>{spot}</li>
                                ))}
                              </ul>
                           </div>
                        </div>

                        {/* Hotels */}
                        <div className="flex gap-4">
                           <div className="flex flex-col items-center w-6">
                              <Hotel className="w-5 h-5 text-gray-400" />
                           </div>
                           <div className="flex-1">
                              <h3 className="text-base font-bold text-gray-800 mb-4">숙소</h3>
                              <div className="space-y-6 pb-4">
                                {travelData.summary.hotels.map((hotel, idx) => (
                                   <div key={idx} className="relative">
                                      <div className="absolute -left-[30px] top-2 w-2 h-2 rounded-full bg-gray-300"></div>
                                      
                                      <div className="flex items-center gap-2 mb-2">
                                        <span className="font-bold text-sm text-gray-800">{hotel.badge}</span>
                                        <span className="inline-block px-2 py-0.5 bg-orange-100 text-orange-600 text-[10px] font-bold rounded">
                                          {hotel.count}
                                        </span>
                                      </div>
                                      <div className="border border-gray-200 rounded-lg p-4 bg-white shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                                         {hotel.tags && hotel.tags.includes("조식 포함") && (
                                           <div className="absolute top-0 right-0 bg-blue-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg">
                                             조식 포함
                                           </div>
                                         )}
                                         <h4 className="font-bold text-gray-800 text-sm mb-1">{hotel.name}</h4>
                                         <p className="text-xs text-gray-500 mb-2">{hotel.desc}</p>
                                         <a 
                                            href={getGoogleMapsLink(hotel.query)} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="text-xs text-blue-500 flex items-center hover:underline"
                                         >
                                            지도 보기 <ChevronRight className="w-3 h-3" />
                                         </a>
                                      </div>
                                   </div>
                                ))}
                              </div>
                           </div>
                        </div>
                      </div>
                    </section>

                    <hr className="border-gray-100" />

                    {/* 3. Detailed Itinerary */}
                    <div className="space-y-12">
                      {travelData.itinerary.map((day, dIdx) => (
                        <div key={dIdx} ref={el => dayRefs.current[dIdx] = el} className="scroll-mt-32">
                          <div className="flex items-center mb-6">
                            <div className="bg-pink-600 text-white font-bold text-sm px-3 py-1 rounded-md shadow-sm mr-3">
                              {day.day}일차
                            </div>
                            <div>
                              <div className="font-bold text-lg text-gray-800">{day.date}</div>
                              <div className="text-xs text-gray-500 flex items-center">
                                <MapPin className="w-3 h-3 mr-1" /> {day.location}
                              </div>
                            </div>
                          </div>

                          <div className="pl-2 space-y-0">
                            {day.events.map((event, eIdx) => {
                              if (event.type === 'flight_card') {
                                return <FlightTimelineCard key={eIdx} flightInfo={event.flightInfo} type={dIdx === 0 ? 'departure' : 'arrival'} />;
                              }

                              const needsMapLink = !event.isGallery && (event.type === 'food' || event.type === 'shopping' || event.type === 'tour');

                              return (
                                <div key={eIdx} className="flex gap-4 relative pb-8 last:pb-0 group">
                                  <div className="absolute left-[19px] top-2 bottom-0 w-[2px] bg-gray-100 group-last:hidden"></div>

                                  <div className={`relative z-10 w-10 h-10 rounded-full border-4 border-white shadow-sm flex items-center justify-center flex-shrink-0
                                    ${event.type === 'flight' || event.type === 'arrival' ? 'bg-blue-100 text-blue-600' : 
                                      event.type === 'food' ? 'bg-orange-100 text-orange-600' : 
                                      event.type === 'hotel' ? 'bg-indigo-100 text-indigo-600' : 
                                      event.type === 'tour' ? 'bg-pink-100 text-pink-600' : 
                                      event.type === 'shopping' ? 'bg-purple-100 text-purple-600' :
                                      event.type === 'move' ? 'bg-slate-100 text-slate-600' :
                                      'bg-gray-100 text-gray-500'}`}>
                                    {event.type === 'food' && <Utensils className="w-4 h-4" />}
                                    {event.type === 'hotel' && <Hotel className="w-4 h-4" />}
                                    {event.type === 'tour' && <Camera className="w-4 h-4" />}
                                    {(event.type === 'flight' || event.type === 'arrival') && <Plane className="w-4 h-4" />}
                                    {event.type === 'shopping' && <ShoppingBag className="w-4 h-4" />}
                                    {event.type === 'move' && <Car className="w-4 h-4" />}
                                  </div>

                                  <div className="flex-1 pt-1 min-w-0">
                                    <div className="flex items-center gap-1 mb-1">
                                        {event.isGallery ? (
                                          <h4 className="font-bold text-gray-900 text-lg flex items-center cursor-pointer hover:text-pink-600 transition-colors group/title"
                                              onClick={() => window.open(getGoogleMapsLink(event.searchQuery || event.title), '_blank')}>
                                            {event.title} <ChevronRight className="w-5 h-5 ml-1 text-gray-400 group-hover/title:text-pink-600 transition-colors" />
                                          </h4>
                                        ) : needsMapLink ? (
                                          <h4 className="font-bold text-gray-800 text-base flex items-center gap-1 cursor-pointer hover:text-pink-600 transition-colors group/title"
                                              onClick={() => window.open(getGoogleMapsLink(event.searchQuery || event.title), '_blank')}>
                                            {event.title} 
                                            <span className="text-xs text-gray-400 group-hover/title:text-pink-600 bg-gray-100 group-hover/title:bg-pink-50 px-1.5 py-0.5 rounded-full flex items-center">
                                              <MapPin className="w-3 h-3 mr-0.5" />지도
                                            </span>
                                          </h4>
                                        ) : (
                                          <h4 className="font-bold text-gray-800 text-base">{event.title}</h4>
                                        )}
                                        
                                        {!event.isGallery && (
                                          <span className="text-xs font-bold text-gray-400 ml-auto">{event.time}</span>
                                        )}
                                    </div>
                                    
                                    <p className={`text-sm text-gray-600 leading-relaxed mb-3 ${event.isGallery ? 'font-medium' : ''}`}>
                                      {event.desc}
                                    </p>

                                    {event.isGallery && event.images && (
                                      <div className="mt-3">
                                        <div className="flex gap-3 overflow-x-auto pb-4 snap-x hide-scrollbar">
                                          {event.images.map((imgUrl, i) => (
                                            <div key={i} className="snap-center shrink-0 w-64 h-40 rounded-lg overflow-hidden relative shadow-sm border border-gray-100">
                                              <img src={imgUrl} alt={`${event.title}-${i}`} className="w-full h-full object-cover hover:scale-105 transition-transform duration-500" />
                                            </div>
                                          ))}
                                          <div className="snap-center shrink-0 w-24 h-40 rounded-lg bg-gray-50 border border-gray-200 flex flex-col items-center justify-center text-gray-400 hover:bg-gray-100 cursor-pointer"
                                             onClick={() => window.open(getGoogleMapsLink(event.searchQuery || event.title), '_blank')}>
                                            <Camera className="w-6 h-6 mb-1" />
                                            <span className="text-xs">더보기</span>
                                          </div>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </>
              )}

              {activeTab === 'shopping' && (
                <div className="p-5 animate-fadeIn">
                  <div className="bg-white border border-blue-200 rounded-xl p-5 mb-6 shadow-sm">
                    <h3 className="text-lg font-bold text-blue-800 mb-3 flex items-center">
                      <CreditCard className="w-5 h-5 mr-2" /> 사전 경비 (예약/결제)
                    </h3>
                    <div className="space-y-3">
                      {travelData.prepaidCosts.map((cost, idx) => (
                        <div key={idx} className="flex justify-between items-center text-sm border-b border-gray-100 last:border-0 pb-2 last:pb-0">
                          <span className="text-gray-600">{cost.item}</span>
                          <span className="font-bold text-blue-600">{cost.cost}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-gradient-to-r from-teal-50 to-teal-100 p-5 rounded-xl border border-teal-200 mb-6">
                    <h3 className="text-lg font-bold text-teal-800 mb-3 flex items-center">
                      <Wallet className="w-5 h-5 mr-2" /> 3인 가족 현지 예상 경비
                    </h3>
                    <div className="space-y-2 text-sm text-teal-900">
                      <div className="flex justify-between border-b border-teal-200 pb-1">
                        <span>식비/간식</span>
                        <span className="font-bold">약 43,000엔</span>
                      </div>
                      <div className="flex justify-between border-b border-teal-200 pb-1">
                        <span>교통/주유</span>
                        <span className="font-bold">약 8,900엔</span>
                      </div>
                      <div className="flex justify-between border-b border-teal-200 pb-1">
                        <span>입장료/체험</span>
                        <span className="font-bold">약 2,800엔 + α</span>
                      </div>
                      <div className="flex justify-between pt-1">
                        <span>쇼핑</span>
                        <span className="font-bold">약 29,000엔~</span>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 gap-4">
                    {travelData.shopping.map((shop, idx) => (
                      <div key={idx} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex gap-4">
                        <div className="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center flex-shrink-0">
                          {shop.icon}
                        </div>
                        <div className="flex-1">
                          <div className="flex justify-between items-start">
                            <h4 className="font-bold text-gray-800">{shop.name}</h4>
                            <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">{shop.category}</span>
                          </div>
                          <p className="text-sm text-gray-500 mt-1 mb-2">{shop.desc}</p>
                          <div className="bg-pink-50 p-2 rounded-lg">
                            <span className="text-xs font-bold text-pink-700 block mb-1">🔥 주요 품목</span>
                            <div className="flex flex-wrap gap-2">
                              {shop.mustBuy.map((item, mIdx) => (
                                <span key={mIdx} className="text-xs bg-white text-pink-600 border border-pink-100 px-2 py-0.5 rounded-full flex items-center">
                                  <CheckCircle className="w-3 h-3 mr-1" /> {item}
                                </span>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
